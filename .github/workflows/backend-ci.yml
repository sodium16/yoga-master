name : Backend CI

on : 
    push:
        paths:
            - "backend/**"
    pull_request:
        paths:
            - "backend/**"

jobs:
    build:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: backend
        
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                node-version: 22

            - run: npm ci

            - run: node --check index.js